name: Build PVH Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "PVH-Filename-Corrector/**"
      - ".github/workflows/build-pvh-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: PVH-Filename-Corrector

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: PVH-Filename-Corrector/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download CLIP model
        run: |
          python -c "from transformers import CLIPModel, CLIPProcessor; CLIPProcessor.from_pretrained('openai/clip-vit-base-patch32'); CLIPModel.from_pretrained('openai/clip-vit-base-patch32')"

      - name: Build portable Windows package
        run: python scripts/build_portable.py --bundle-clip

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: PVH-Rename-Portable-Windows
          path: PVH-Filename-Corrector/dist/PVH-Rename-Portable.zip
          retention-days: 30
